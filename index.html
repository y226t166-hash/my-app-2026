<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘の鍛冶場 - クリッカーゲーム</title>
    <link rel="icon" href="blob:https://gemini.google.com/d9c49be8-87ad-4385-b7e7-4636ff8cfd33">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-top">
                <h1>神秘の鍛冶場</h1>
                <button id="bgm-toggle" class="icon-btn" title="BGM 切替">🔇</button>
            </div>
            <div id="resources" class="resource-bar">
                <div class="resource" title="所持金"><span class="icon">💰</span> <span id="gold-count">0</span> G</div>
                <div class="resource" title="鉄の塊"><span class="icon">⛓️</span> <span id="iron-count">0</span></div>
                <div class="resource" title="原木"><span class="icon">🪵</span> <span id="wood-count">0</span></div>
                <div class="resource" title="魔力の結晶"><span class="icon">💎</span> <span id="mana-count">0</span></div>
            </div>
        </header>

        <nav>
            <button class="nav-btn active" data-tab="gather">収集</button>
            <button class="nav-btn" data-tab="forge">鍛造</button>
            <button class="nav-btn" data-tab="inventory">倉庫</button>
            <button class="nav-btn" data-tab="employees">雇用</button>
        </nav>

        <main>
            <section id="gather" class="tab-content active">
                <div class="gather-zone">
                    <button id="mine-iron" class="action-btn">
                        <span class="btn-title">採掘する</span>
                        <span class="btn-desc">鉄を獲得</span>
                    </button>
                    <button id="chop-wood" class="action-btn">
                        <span class="btn-title">伐採する</span>
                        <span class="btn-desc">木材を獲得</span>
                    </button>
                    <button id="search-mana" class="action-btn">
                        <span class="btn-title">探索する</span>
                        <span class="btn-desc">マナを獲得</span>
                    </button>
                </div>
            </section>

            <section id="forge" class="tab-content">
                <div class="recipe-list" id="recipe-list">
                    <!-- レシピがここに挿入されます -->
                </div>
                <div id="crafting-status" class="hidden">
                    <p id="crafting-msg"></p>
                    <div class="progress-bar">
                        <div id="crafting-progress-inner"></div>
                    </div>
                </div>
            </section>

            <section id="inventory" class="tab-content">
                <div class="inventory-grid" id="inventory-grid">
                    <!-- 武器がここに挿入されます -->
                </div>
            </section>

            <section id="employees" class="tab-content">
                <div class="upgrade-list" id="employee-list">
                    <!-- 従業員リストがここに挿入されます -->
                </div>
            </section>
        </main>

        <footer>
            <div id="log" class="game-log">
                <p>神秘の鍛冶場へようこそ。まずは材料を集めましょう。</p>
            </div>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
