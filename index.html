<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Arcane Forge</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>The Arcane Forge</h1>
            <div id="resources" class="resource-bar">
                <div class="resource" title="Gold"><span class="icon">💰</span> <span id="gold-count">0</span></div>
                <div class="resource" title="Iron"><span class="icon">⛓️</span> <span id="iron-count">0</span></div>
                <div class="resource" title="Wood"><span class="icon">🪵</span> <span id="wood-count">0</span></div>
                <div class="resource" title="Mana Crystal"><span class="icon">💎</span> <span id="mana-count">0</span></div>
            </div>
        </header>

        <nav>
            <button class="nav-btn active" data-tab="gather">Gather</button>
            <button class="nav-btn" data-tab="forge">Forge</button>
            <button class="nav-btn" data-tab="inventory">Inventory</button>
        </nav>

        <main>
            <section id="gather" class="tab-content active">
                <div class="gather-zone">
                    <button id="mine-iron" class="action-btn">Mine Iron</button>
                    <button id="chop-wood" class="action-btn">Chop Wood</button>
                    <button id="search-mana" class="action-btn">Search Mana</button>
                </div>
            </section>

            <section id="forge" class="tab-content">
                <div class="recipe-list" id="recipe-list">
                    <!-- Recipes will be injected here -->
                </div>
                <div id="crafting-status" class="hidden">
                    <p id="crafting-msg"></p>
                    <div class="progress-bar">
                        <div id="crafting-progress-inner"></div>
                    </div>
                </div>
            </section>

            <section id="inventory" class="tab-content">
                <div class="inventory-grid" id="inventory-grid">
                    <!-- Weapons will be injected here -->
                </div>
            </section>
        </main>

        <footer>
            <div id="log" class="game-log">
                <p>Welcome to the Arcane Forge. Start by gathering resources!</p>
            </div>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
